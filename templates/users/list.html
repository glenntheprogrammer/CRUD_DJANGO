{% extends "layout/base.html" %}
{% load static %}
{% block content %}

<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>User Management</h1>
        </div>
        <div class="col-sm-6">
          <ol class="breadcrumb float-sm-right">
            <li class="breadcrumb-item"><a href="#">Home</a></li>
            <li class="breadcrumb-item active">User List</li>
          </ol>
        </div>
      </div>
    </div>
  </section>

  <section class="content">
    <div class="container-fluid">
      <div class="row">
        <div class="col-12">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title mt-2">List of User Accounts</h3>
              <div class="float-right">
                <button type="button" class="btn btn-md btn-primary" id="addUserBtn">
                  <i class="fa fa-plus-circle"></i> Add New
                </button>
              </div>
            </div>
            <div class="card-body">
              <table id="example1" class="table table-bordered table-striped">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Username</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Staff</th>
                    <th>Active</th>
                    <th width="150">Actions</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

<!-- ================= MODAL ================= -->
<div class="modal fade" id="userModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title"><i class="fa fa-copy"></i> User Forms</h5>
        <button type="button" class="close" data-dismiss="modal">&times;</button>
      </div>

      <div class="modal-body">
        <form id="userForm">
          <input type="hidden" id="user_id">

          <div class="form-group">
            <label>Username <span class="text-danger">*</span></label>
            <input type="text" id="username" class="form-control" required>
          </div>

          <div class="form-group">
            <label>First Name <span class="text-danger">*</span></label>
            <input type="text" id="first_name" class="form-control" required>
          </div>

          <div class="form-group">
            <label>Last Name <span class="text-danger">*</span></label>
            <input type="text" id="last_name" class="form-control" required>
          </div>

          <div class="form-group">
            <label>Email <span class="text-danger">*</span></label>
            <input type="email" id="email" class="form-control" required>
          </div>

          <div class="form-group">
            <label>Password <span class="text-danger password-star">*</span></label>
            <input type="password" id="password" class="form-control">
          </div>

          <div class="form-check">
            <input type="checkbox" id="is_staff">
            <label>Staff</label>
          </div>

          <div class="form-check">
            <input type="checkbox" id="is_active" checked>
            <label>Active</label>
          </div>

          <div class="modal-footer px-0">
            <button type="submit" class="btn btn-primary">
              <i class="fa fa-save"></i> Save Changes
            </button>
          </div>

        </form>
      </div>

    </div>
  </div>
</div>

{% block extra_js %}
<script>
$(document).ready(function() {
  // CSRF FIX
  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
      const cookies = document.cookie.split(';');
      for (let cookie of cookies) {
        cookie = cookie.trim();
        if (cookie.startsWith(name + '=')) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }

  $.ajaxSetup({
    headers: { "X-CSRFToken": getCookie("csrftoken") }
  });

  // TOAST FUNCTION
  function showToast(title, message, type="success") {
    let bgClass = "bg-success";
    if (type === "error") bgClass = "bg-danger";
    if (type === "warning") bgClass = "bg-warning";
    if (type === "info") bgClass = "bg-info";

    let toast = `
      <div class="toast ${bgClass}" role="alert" data-delay="3000">
        <div class="toast-header">
          <strong class="mr-auto">${title}</strong>
          <button type="button" class="ml-2 mb-1 close" data-dismiss="toast">&times;</button>
        </div>
        <div class="toast-body">${message}</div>
      </div>
    `;
    $("#toast-container").append(toast);
    $('.toast').toast('show');
    $('.toast').on('hidden.bs.toast', function () { $(this).remove(); });
  }

  // DATATABLE
  var table = $("#example1").DataTable({
    ajax: { url: "{% url 'user_list_ajax' %}", dataSrc: "data" },
    paging: true,
    lengthChange: true,
    searching: true,
    ordering: true,
    info: true,
    autoWidth: false,
    responsive: true,
    columns: [
      {
        data: null,
        render: function (data, type, row, meta) {
          return meta.row + 1;   // Auto increment
        }
      },
      { data: "username" },
      { 
        data: null, 
        render: function(data){ return data.first_name + " " + data.last_name; }
      },
      { data: "email" },
      { data: "is_staff" },
      { data: "is_active" },
      {
        data: null,
        render: function () {
          return `
            <button class="btn btn-sm btn-warning editBtn">
              <i class="far fa-edit"></i> Edit
            </button>
            <button class="btn btn-sm btn-danger deleteBtn">
              <i class="fas fa-trash-alt"></i> Delete
            </button>
          `;
        }
      }
    ]
  });

  // ADD USER
  $("#addUserBtn").click(function(){
    $("#userForm")[0].reset();
    $("#user_id").val('');
    $("#password").prop("required", true); // password required on add
    $(".password-star").show();
    $("#userModal").modal('show');
  });

  // EDIT USER
  $('#example1').on('click', '.editBtn', function(){
    var data = table.row($(this).parents('tr')).data();
    var url = "{% url 'user_get_ajax' 0 %}".replace('0', data.id);

    $.get(url, function(response){
      $("#user_id").val(response.id);
      $("#username").val(response.username);
      $("#first_name").val(response.first_name);
      $("#last_name").val(response.last_name);
      $("#email").val(response.email);
      $("#is_staff").prop("checked", response.is_staff);
      $("#is_active").prop("checked", response.is_active);

      $("#password").val('');
      $("#password").prop("required", false); // NOT required on update
      $(".password-star").hide();

      $("#userModal").modal('show');
    });
  });

  // DELETE USER
  $('#example1').on('click', '.deleteBtn', function(){
    var data = table.row($(this).parents('tr')).data();
    var url = "{% url 'user_delete_ajax' 0 %}".replace('0', data.id);

    if(confirm("Delete this user?")){
      $.ajax({
        url: url,
        type: "POST",
        success: function(){ 
          table.ajax.reload(); 
          showToast("Deleted", "User deleted successfully!", "success"); 
        },
        error: function(xhr){ 
          showToast("Error", xhr.responseJSON?.error || "Cannot delete this user.", "error"); 
        }
      });
    }
  });

  // SAVE USER (FORM SUBMIT)
  $("#userForm").on("submit", function(e){
    e.preventDefault();

    // Browser validation
    if (!this.checkValidity()) {
      this.reportValidity();
      return;
    }

    $.ajax({
      url: "{% url 'user_save_ajax' %}",
      type: "POST",
      data: {
        id: $("#user_id").val(),
        username: $("#username").val(),
        first_name: $("#first_name").val(),
        last_name: $("#last_name").val(),
        email: $("#email").val(),
        password: $("#password").val(),
        is_staff: $("#is_staff").is(":checked"),
        is_active: $("#is_active").is(":checked"),
      },
      success: function(response){
        $("#userModal").modal('hide');
        table.ajax.reload();
        showToast("Success", "User saved successfully!", "success");
      },
      error: function(xhr){
        showToast("Error", xhr.responseJSON?.error || "Something went wrong.", "error");
      }
    });
  });

});
</script>
{% endblock %}

{% endblock %}
